idea:
  title: Sampling Neural Network
  domain: machine_learning
  hypothesis: 'Introducing sampling from the distribution of activations at an intermediate
    neural network layer, similar to sampling from the final softmax layer, will alter
    the network''s behavior in ways that may provide new insights or capabilities
    compared to standard deterministic activations.

    '
  background:
    description: 'What if we made a neural network where we take the distribution
      of activations on an intermediate layer and sample from it, the way we do in
      the final softmax layer? What would that do that everything?

      This isn''t Peter West''s idea.

      '
